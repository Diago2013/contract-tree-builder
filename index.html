<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌳 契约树 — 思维导图式网站构建器</title>
<style>
:root{
--bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9; --text2:#8b949e;
--accent:#58a6ff; --green:#3fb950; --orange:#d2991d; --red:#f85149; --purple:#bc8cff;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
--shadow:0 8px 24px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
body.drag-over::after{content:'松开导入导图';position:fixed;inset:0;background:rgba(88,166,255,.15);z-index:9999;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--accent);border:4px dashed var(--accent);border-radius:16px;margin:20px;pointer-events:none}

/* ---- TOP BAR ---- */
.tb{display:flex;align-items:center;gap:4px;padding:4px 12px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;height:40px;min-height:40px}
.tb .logo{font-size:15px;font-weight:700;color:var(--green);margin-right:8px;white-space:nowrap;cursor:pointer}
.tb .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tb button{padding:4px 10px;border:1px solid transparent;border-radius:5px;background:transparent;color:var(--text);cursor:pointer;font-size:12px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px;height:28px}
.tb button:hover{background:rgba(255,255,255,.06);border-color:var(--border)}
.tb button.accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.tb button.accent:hover{filter:brightness(1.15)}
.tb button.accent2{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
.tb button .kbd{font-size:10px;color:var(--text2);margin-left:2px}
.tb .spacer{flex:1}
.tb .file-name{font-size:12px;color:var(--text2);background:rgba(255,255,255,.03);padding:2px 10px;border-radius:4px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.tb .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}

/* ---- CANVAS ---- */
.canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;background:radial-gradient(ellipse at center,#1a2332 0%,#0d1117 60%)}
.canvas-wrap:active{cursor:grabbing}
.canvas-wrap.panning{cursor:grabbing}
.canvas-wrap svg{display:block}
.node-group{cursor:pointer;transition:transform .15s}
.node-group:hover{filter:brightness(1.1)}
.node-rect{transition:all .2s}
.node-label{pointer-events:none;font-weight:500}
.node-desc{pointer-events:none}
.edge-path{fill:none;stroke-width:1.5;stroke-linecap:round;transition:stroke .2s}
.add-btn{opacity:0;transition:opacity .15s;cursor:pointer}
.node-group:hover .add-btn{opacity:1}
.add-btn:hover circle{fill:var(--accent)}

/* ---- MINIMAP ---- */
.minimap{position:absolute;right:12px;bottom:12px;width:160px;height:110px;background:var(--surface);border:1px solid var(--border);border-radius:8px;z-index:50;overflow:hidden;box-shadow:var(--shadow)}
.minimap svg{width:100%;height:100%}

/* ---- FLOATING PANEL ---- */
.fpanel{position:absolute;right:16px;top:56px;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:10px;z-index:60;box-shadow:var(--shadow);display:none;overflow:hidden}
.fpanel.open{display:block}
.fpanel .fhead{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;gap:8px;cursor:move}
.fpanel .fhead .close{font-size:16px;cursor:pointer;color:var(--text2);margin-left:auto;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.fpanel .fhead .close:hover{background:rgba(255,255,255,.08);color:#fff}
.fpanel .fbody{padding:10px;max-height:400px;overflow-y:auto}
.fpanel label{display:block;font-size:10px;color:var(--text2);margin:8px 0 3px;text-transform:uppercase;letter-spacing:.5px}
.fpanel input,.fpanel textarea,.fpanel select{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit;resize:vertical}
.fpanel input:focus,.fpanel textarea:focus{outline:none;border-color:var(--accent)}
.fpanel textarea{min-height:50px}
.fpanel .btn-c{display:flex;gap:6px;margin-top:10px}
.fpanel .btn-c button{flex:1;padding:6px;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px}
.fpanel .btn-c .del{color:var(--red);border-color:var(--red)}
.fpanel .btn-c .del:hover{background:var(--red);color:#fff}
.fpanel .btn-c .add{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}

/* ---- AI PANEL ---- */
.aipanel{position:absolute;right:16px;top:56px;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:10px;z-index:61;box-shadow:var(--shadow);display:none}
.aipanel.open{display:block}
.aipanel .aibody{padding:12px;max-height:500px;overflow-y:auto}
.aipanel .log{font-size:11px;line-height:1.7;max-height:180px;overflow-y:auto;background:var(--bg);padding:8px;border-radius:6px;margin-bottom:10px;font-family:'SF Mono',Consolas,monospace}
.aipanel .log .m{margin-bottom:4px}
.aipanel .log .user{color:var(--accent)}
.aipanel .log .ai{color:var(--green)}
.aipanel .log .err{color:var(--red)}
.aipanel .btn-c{margin-top:6px;display:flex;gap:6px}
.aipanel .btn-c button{flex:1}

/* ---- CONTEXT MENU ---- */
.ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 0;z-index:999;display:none;box-shadow:var(--shadow);min-width:170px}
.ctx .item{padding:7px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.ctx .item:hover{background:rgba(88,166,255,.1);color:#fff}
.ctx .item.del{color:var(--red)}
.ctx .hr{height:1px;background:var(--border);margin:3px 0}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);padding:8px 20px;background:var(--surface);border:1px solid var(--accent);border-radius:8px;color:#fff;font-size:12px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:var(--shadow)}
.toast.on{opacity:1}

/* ---- WELCOME OVERLAY ---- */
.welcome{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none}
.welcome .card{pointer-events:auto;text-align:center;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
.welcome .card h1{font-size:2rem;color:var(--accent);margin-bottom:8px}
.welcome .card p{color:var(--text2);margin-bottom:24px;line-height:1.6}
.welcome .card .big-btn{display:inline-block;padding:10px 28px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
.welcome .card .big-btn.sec{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.welcome .card .hotkeys{font-size:10px;color:var(--text2);margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.welcome .card .hotkeys span{background:rgba(255,255,255,.04);padding:2px 8px;border-radius:4px}
.welcome .card input::placeholder{color:#555}

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="tb">
  <span class="logo" onclick="resetAll()">🌳 契约树</span>
  <span class="sep"></span>
  <button onclick="addChildNode()" title="添加子节点 (Tab)">➕ 子节点</button>
  <button onclick="addSiblingNode()" title="添加兄弟节点 (Enter)">📋 兄弟</button>
  <button onclick="deleteNode()" title="删除 (Delete)">🗑️</button>
  <span class="sep"></span>
  <button onclick="zoomIn()">🔍<span class="kbd">+</span></button>
  <button onclick="zoomOut()">🔍<span class="kbd">-</span></button>
  <button onclick="resetView()">🏠</button>
  <span class="sep"></span>
  <button onclick="toggleAI()" style="background:rgba(88,166,255,.1);border-color:#58a6ff33">🤖 AI</button>
  <button class="accent2" onclick="aiGenTree()">🌳 AI 生成树</button>
  <button class="accent" onclick="aiGenerateSite()">🚀 生成网站</button>
  <button onclick="toggleProps()" style="color:var(--text2)">📋 属性</button>
  <span class="sep"></span>
  <button onclick="exportCursor()" style="color:var(--purple)" title="导出 .cursorrules 给 Cursor IDE">📐 Cursor</button>
  <button onclick="exportClaude()" style="color:var(--orange)" title="复制 prompt 给 Claude Code">🧠 Claude</button>
  <div class="spacer"></div>
  <span class="file-name" id="fileName">未保存的导图</span>
  <button onclick="exportJSON()">📥</button>
  <button onclick="document.getElementById('imp').click()">📤</button>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(event)">
  <span class="dot on"></span>
  <span style="font-size:11px;color:var(--text2)" id="nodeCountTxt">7 节点</span>
</div>

<!-- Canvas -->
<div class="canvas-wrap" id="wrap">
  <svg id="svg"></svg>
  <div class="welcome" id="welcome">
    <div class="card">
      <h1>🌳 契约树</h1>
      <p>输入你的项目方向，AI 自动生成完整功能树<br>像 XMind 一样微调，一键导出给 Cursor 或 Claude Code</p>
      <input type="text" id="topicInput" placeholder="例如：在线教育平台、电商小程序、AI 写作工具..." style="width:100%;max-width:420px;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;text-align:center;font-family:inherit">
      <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="big-btn" onclick="aiGenTree()">🌳 AI 生成功能树</button>
        <button class="big-btn sec" onclick="initBlank();document.getElementById('welcome').style.display='none'">📄 空白画布</button>
        <button class="big-btn sec" onclick="initDemo();document.getElementById('welcome').style.display='none'">📦 看示例</button>
      </div>
      <div class="hotkeys">
        <span>Tab 加子节点</span><span>Enter 加兄弟</span><span>Delete 删除</span>
        <span>滚轮缩放</span><span>Space+拖拽平移</span><span>双击编辑</span>
      </div>
    </div>
  </div>

  <!-- Minimap -->
  <div class="minimap" id="minimap"><svg id="minisvg"></svg></div>

  <!-- Property Panel -->
  <div class="fpanel" id="fpanel">
    <div class="fhead"><span>📋 节点属性</span><span class="close" onclick="toggleProps()">✕</span></div>
    <div class="fbody">
      <label>名称</label>
      <input type="text" id="npName" oninput="syncNode()">
      <label>功能描述</label>
      <textarea id="npDesc" oninput="syncNode()" placeholder="描述这个功能模块..."></textarea>
      <label>类型</label>
      <select id="npType" onchange="syncNode()">
        <option value="page">📄 页面</option><option value="module">🧩 功能模块</option>
        <option value="component">🎨 UI组件</option><option value="api">🔌 API</option>
        <option value="data">🗄️ 数据</option>
      </select>
      <label>技术标签</label>
      <input type="text" id="npTags" oninput="syncNode()" placeholder="react, node.js, mongodb...">
      <div class="btn-c">
        <button class="del" onclick="deleteNode()">🗑️ 删除</button>
        <button class="add" onclick="addChildNode()">➕ 子节点</button>
      </div>
    </div>
  </div>

  <!-- AI Panel -->
  <div class="aipanel" id="aipanel">
    <div class="fhead"><span>🤖 AI 助手</span><span class="close" onclick="toggleAI()">✕</span></div>
    <div class="aibody">
      <div class="log" id="aiLog"><div class="m ai">🤖 就绪。配置 DeepSeek Key 后可使用 AI 优化 + 生成网站。</div></div>
      <label style="font-size:10px;color:var(--text2)">DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
      <div class="btn-c">
        <button onclick="aiOptimize()">🤖 优化结构</button>
        <button class="add" onclick="aiGenerateSite()">🚀 生成网站</button>
      </div>
      <div class="btn-c" style="margin-top:4px">
        <button onclick="previewCode()" style="color:var(--text2)">👁️ 预览</button>
        <button onclick="downloadCode()" style="color:var(--green)">💾 下载 HTML</button>
      </div>
      <div class="btn-c" style="margin-top:4px">
        <button onclick="exportCursor()" style="color:var(--purple)">📐 导出 .cursorrules</button>
        <button onclick="exportClaude()" style="color:var(--orange)">🧠 复制 Claude Prompt</button>
      </div>
    </div>
  </div>
</div>

<div class="ctx" id="ctx">
  <div class="item" onclick="addChildNode()">➕ 添加子节点</div>
  <div class="item" onclick="addSiblingNode()">📋 添加兄弟节点</div>
  <div class="hr"></div>
  <div class="item" onclick="editLabel()">✏️ 重命名</div>
  <div class="item" onclick="duplicateBranch()">📑 复制分支</div>
  <div class="hr"></div>
  <div class="item del" onclick="deleteNode()">🗑️ 删除</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ======================== STATE ========================
const S={
  nodes:{}, rootId:null, selId:null, nextId:1,
  panX:0, panY:0, scale:1,
  panning:false, panSX:0, panSY:0, sx:0, sy:0,
  genHTML:'',
  apiKey:localStorage.getItem('ct_key')||''
};

// ======================== NODE COLORS ========================
const PALETTE=['#58a6ff','#3fb950','#d2991d','#f85149','#bc8cff','#79c0ff','#56d364','#e3b341'];

// ======================== NODE OPS ========================
function mkNode(label,desc,pid,type){
  const id='n'+(S.nextId++);
  S.nodes[id]={id,label,desc:desc||'',children:[],parentId:pid,level:0,type:type||'page',tags:'',collapsed:false};
  if(pid&&S.nodes[pid]){S.nodes[pid].children.push(id);S.nodes[id].level=S.nodes[pid].level+1}
  return id;
}

// ======================== LAYOUT ========================
let nodePos={};
const NW=180,NH=52,GX=50,GY=22;

function computeLayout(){
  nodePos={};if(!S.rootId||!S.nodes[S.rootId])return;
  const r=S.nodes[S.rootId];
  function sw(id){
    const n=S.nodes[id];if(!n||n.collapsed)return NW;
    if(!n.children.length)return NW;
    let w=0;for(const c of n.children)w+=sw(c);return Math.max(NW,w+(n.children.length-1)*GX);
  }
  function place(id,x,cy){
    const n=S.nodes[id];if(!n)return;
    nodePos[id]={x:x+NW/2,y:cy};
    if(!n.children.length||n.collapsed)return;
    const ks=n.children.map(c=>({id:c,w:sw(c)})).filter(k=>k.w>0);
    if(!ks.length)return;
    const tw=ks.reduce((s,k)=>s+k.w,0)+(ks.length-1)*GX;
    let cx=x-(tw-sw(id))/2;
    for(const k of ks){place(k.id,cx,cy+NH+GY);cx+=k.w+GX;}
  }
  place(S.rootId,0,0);
  if(nodePos[S.rootId]){const rx=nodePos[S.rootId].x;for(const k in nodePos)nodePos[k].x-=rx;}
}

// ======================== RENDER ========================
const svgEl=document.getElementById('svg');

function render(){
  computeLayout();
  svgEl.innerHTML='';
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform',`translate(${S.panX},${S.panY}) scale(${S.scale})`);

  // Edges
  for(const id in S.nodes){
    const n=S.nodes[id];
    if(!n.parentId||!nodePos[id]||!nodePos[n.parentId])continue;
    const p=nodePos[n.parentId],c=nodePos[id];
    const midY=(p.y+NH*.8+c.y)/2;
    const d=`M${p.x} ${p.y+NH/2} C${p.x} ${midY},${c.x} ${midY},${c.x} ${c.y}`;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('class','edge-path');
    path.setAttribute('stroke',id===S.selId?'#58a6ff':'#30363d');
    g.appendChild(path);
  }

  // Nodes (post-order so children render on top)
  function renderNode(id){
    const n=S.nodes[id],np=nodePos[id];if(!n||!np)return;
    const lvl=n.level%PALETTE.length,color=PALETTE[lvl];
    const isRoot=id===S.rootId,sel=id===S.selId;
    const w=Math.max(NW-20,Math.min(n.label.length*13+50,NW+60)),h=isRoot?NH+8:NH;

    const ng=document.createElementNS('http://www.w3.org/2000/svg','g');
    ng.setAttribute('class','node-group');
    ng.setAttribute('transform',`translate(${np.x-w/2},${np.y})`);
    ng.setAttribute('data-id',id);

    // Shadow
    if(sel){
      const sh=document.createElementNS('http://www.w3.org/2000/svg','rect');
      sh.setAttribute('x',-3);sh.setAttribute('y',-3);sh.setAttribute('width',w+6);sh.setAttribute('height',h+6);
      sh.setAttribute('rx',10);sh.setAttribute('fill','none');sh.setAttribute('stroke',color);sh.setAttribute('stroke-width',2);
      sh.setAttribute('opacity',.6);ng.appendChild(sh);
    }

    // Rect
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('class','node-rect');
    rect.setAttribute('width',w);rect.setAttribute('height',h);
    rect.setAttribute('rx',isRoot?14:8);
    if(isRoot){
      rect.setAttribute('fill',color);rect.setAttribute('stroke',color);
    }else{
      rect.setAttribute('fill',sel?'rgba(88,166,255,.08)':'rgba(22,27,34,.9)');
      rect.setAttribute('stroke',sel?'#58a6ff44':'#30363d');
    }
    ng.appendChild(rect);

    // Level stripe (left accent)
    if(!isRoot){
      const stripe=document.createElementNS('http://www.w3.org/2000/svg','rect');
      stripe.setAttribute('x',0);stripe.setAttribute('y',0);stripe.setAttribute('width',3);stripe.setAttribute('height',h);
      stripe.setAttribute('rx',1);stripe.setAttribute('fill',color);ng.appendChild(stripe);
    }

    // Label
    const label=document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('class','node-label');
    label.setAttribute('x',w/2);label.setAttribute('y',h/2-4);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('fill',isRoot?'#000':'#c9d1d9');
    label.setAttribute('font-size',isRoot?'15':'12');
    label.setAttribute('font-weight',isRoot?'700':'500');
    label.textContent=n.label;ng.appendChild(label);

    // Desc
    if(n.desc&&!isRoot){
      const desc=document.createElementNS('http://www.w3.org/2000/svg','text');
      desc.setAttribute('class','node-desc');
      desc.setAttribute('x',w/2);desc.setAttribute('y',h/2+14);
      desc.setAttribute('text-anchor','middle');
      desc.setAttribute('fill','#8b949e');desc.setAttribute('font-size','9');
      const txt=n.desc.slice(0,22);desc.textContent=txt+(n.desc.length>22?'…':'');
      ng.appendChild(desc);
    }

    // Add button
    const ab=document.createElementNS('http://www.w3.org/2000/svg','g');
    ab.setAttribute('class','add-btn');
    ab.setAttribute('data-action','add');ab.setAttribute('data-id',id);
    const ac=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ac.setAttribute('cx',w+10);ac.setAttribute('cy',h/2);ac.setAttribute('r',8);
    ac.setAttribute('fill','#30363d');ab.appendChild(ac);
    const at=document.createElementNS('http://www.w3.org/2000/svg','text');
    at.setAttribute('x',w+10);at.setAttribute('y',h/2+5);at.setAttribute('text-anchor','middle');
    at.setAttribute('fill','#c9d1d9');at.setAttribute('font-size','14');at.textContent='+';
    ab.appendChild(at);
    ng.appendChild(ab);

    // Collapse indicator
    if(n.children.length>0){
      const cg=document.createElementNS('http://www.w3.org/2000/svg','g');
      cg.setAttribute('data-action','toggle');cg.setAttribute('data-id',id);
      const cc=document.createElementNS('http://www.w3.org/2000/svg','circle');
      cc.setAttribute('cx',w/2);cc.setAttribute('cy',h+10);cc.setAttribute('r',8);
      cc.setAttribute('fill','#161b22');cc.setAttribute('stroke','#30363d');cc.setAttribute('stroke-width',1.5);
      cg.appendChild(cc);
      const ct=document.createElementNS('http://www.w3.org/2000/svg','text');
      ct.setAttribute('x',w/2);ct.setAttribute('y',h+14);ct.setAttribute('text-anchor','middle');
      ct.setAttribute('fill','#8b949e');ct.setAttribute('font-size','10');
      ct.textContent=n.collapsed?'▶':'▼';cg.appendChild(ct);
      ng.appendChild(cg);
    }

    g.appendChild(ng);
    for(const c of n.children)renderNode(c);
  }
  if(S.rootId)renderNode(S.rootId);
  svgEl.appendChild(g);
  document.getElementById('nodeCountTxt').textContent=Object.keys(S.nodes).length+' 节点';
  renderMinimap();
}

// ======================== MINIMAP ========================
function renderMinimap(){
  const ms=document.getElementById('minisvg');
  ms.innerHTML='';
  if(!Object.keys(nodePos).length)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const k in nodePos){const p=nodePos[k];minX=Math.min(minX,p.x-NW/2);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x+NW/2);maxY=Math.max(maxY,p.y+NH)}
  const pw=160,ph=110,pad=30;
  const sx=(pw-pad*2)/(maxX-minX||1),sy=(ph-pad*2)/(maxY-minY||1),s=Math.min(sx,sy);
  const ox=pad-(minX*s),oy=pad-(minY*s);
  for(const k in nodePos){
    const p=nodePos[k],n=S.nodes[k];if(!n)continue;
    const c=document.createElementNS('http://www.w3.org/2000/svg','rect');
    c.setAttribute('x',p.x*s+ox-NW*s/2);c.setAttribute('y',p.y*s+oy);
    c.setAttribute('width',NW*s);c.setAttribute('height',NH*s);
    c.setAttribute('rx',2);c.setAttribute('fill',PALETTE[n.level%PALETTE.length]);
    c.setAttribute('opacity',.5);ms.appendChild(c);
  }
}

function buildSpecText(){
  const t=buildTree(),flat=flatList();
  let txt=`# ${t.label} — 完整功能规格书\n\n`;
  txt+=`> 由契约树思维导图生成 · ${new Date().toLocaleDateString('zh-CN')}\n\n`;
  txt+=`## 项目概述\n${t.desc||t.label}\n\n`;
  txt+=`## 功能架构\n\n`;
  function walk(node,depth){
    const prefix='  '.repeat(depth)+'- ';
    txt+=`${prefix}**${node.label}**`;
    if(node.desc)txt+=` — ${node.desc}`;
    if(node.tags)txt+=` \`${node.tags}\``;
    txt+='\n';
    if(node.children)node.children.forEach(c=>walk(c,depth+1));
  }
  walk(t,0);
  txt+=`\n## 页面清单\n`;
  flat.filter(n=>n.type==='page').forEach(p=>txt+=`- ${p.label}: ${p.desc||''}\n`);
  txt+=`\n## API接口清单\n`;
  flat.filter(n=>n.type==='api').forEach(a=>txt+=`- ${a.label}: ${a.desc||''}\n`);
  txt+=`\n## 技术标签\n`;
  const tags=[...new Set(flat.map(n=>n.tags).filter(Boolean).flatMap(t=>t.split(/[,;，；]/).map(s=>s.trim())))];
  tags.forEach(t=>txt+=`- ${t}\n`);
  return txt;
}

// ======================== UTILS ========================
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),1800);
}

// ======================== INIT ========================
function initBlank(){
  S.rootId=mkNode('我的网站','',null,'page');selNode(S.rootId);render();
}
function initDemo(){
  const r=mkNode('在线教育平台','全功能在线学习管理系统',null,'page');
  const h=mkNode('首页','平台入口，包含课程推荐/搜索/热门讲师',r,'page');
  mkNode('Hero区域','大图轮播+搜索框+CTA按钮',h,'component');
  mkNode('课程推荐','AI推荐/热门/最新 三Tab切换课程卡片',h,'module');
  mkNode('导航栏','响应式导航+用户头像+通知铃铛',h,'component');
  const crs=mkNode('课程中心','课程浏览/筛选/详情/购买',r,'page');
  mkNode('课程列表','分页+筛选（分类/价格/难度）+排序',crs,'module');
  mkNode('课程详情','视频播放器/章节列表/笔记/评论',crs,'module');
  mkNode('购物车','批量购买/优惠码/支付',crs,'module');
  const usr=mkNode('用户中心','个人设置/学习记录/证书',r,'page');
  mkNode('个人资料','头像/昵称/简介/社交绑定',usr,'component');
  mkNode('学习进度','课程进度条/学习时长统计/连续打卡',usr,'module');
  mkNode('我的证书','电子证书展示/分享/下载',usr,'module');
  const adm=mkNode('管理后台','内容管理/用户管理/数据看板',r,'page');
  mkNode('课程管理','CRUD/上下架/价格设置',adm,'module');
  mkNode('用户管理','列表/封禁/角色权限',adm,'module');
  mkNode('数据看板','注册量/付费率/课程完课率 图表',adm,'module');
  const api=mkNode('API接口','后端 RESTful API',r,'api');
  mkNode('用户注册','POST /api/auth/register',api,'api');
  mkNode('课程列表','GET /api/courses?page=&category=',api,'api');
  mkNode('下单支付','POST /api/orders {courseId, coupon}',api,'api');
  S.rootId=r;selNode(r);render();
  document.getElementById('fileName').textContent='在线教育平台.ct';
  toast('示例导图已加载');
}
function resetAll(){S.nodes={};S.rootId=null;S.selId=null;S.nextId=1;S.genHTML='';initDemo();render();document.getElementById('welcome').style.display='none';document.getElementById('fileName').textContent='未保存的导图'}

// Start
document.getElementById('apiKey').value=S.apiKey;
document.getElementById('apiKey').addEventListener('change',function(){S.apiKey=this.value;localStorage.setItem('ct_key',this.value)});
</script>
